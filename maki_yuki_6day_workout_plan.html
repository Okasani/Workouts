<style>
*{margin:0;padding:0;box-sizing:border-box}
.wrap{font-family:var(--font-sans);color:var(--color-text-primary);padding:0.5rem 0}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.tab{padding:6px 14px;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);transition:all .2s}
.tab.active{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.tab:hover:not(.active){background:var(--color-background-secondary)}
.day{display:none}
.day.show{display:block}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 10px;border-radius:var(--border-radius-md);margin-bottom:12px}
.badge-maki{background:#EAF3DE;color:#3B6D11}
.badge-yuki{background:#FAECE7;color:#993C1D}
.badge-rest{background:var(--color-background-secondary);color:var(--color-text-secondary)}
@media(prefers-color-scheme:dark){
.badge-maki{background:#27500A;color:#C0DD97}
.badge-yuki{background:#712B13;color:#F5C4B3}
}
.theme{font-size:13px;color:var(--color-text-secondary);margin-bottom:16px;line-height:1.6}
.exgroup{margin-bottom:14px}
.exgroup-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.ex{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);margin-bottom:6px;font-size:14px}
.ex-name{font-weight:500}
.ex-detail{font-size:12px;color:var(--color-text-secondary);white-space:nowrap}
.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:16px}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;text-align:center}
.stat-val{font-size:20px;font-weight:500}
.stat-lbl{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.note{font-size:12px;color:var(--color-text-secondary);line-height:1.6;margin-top:12px;padding:10px 14px;border-left:2px solid var(--color-border-tertiary)}
</style>
<div class="wrap">
<div class="stats">
<div class="stat"><div class="stat-val">~2,150</div><div class="stat-lbl">kcal / day</div></div>
<div class="stat"><div class="stat-val">91g</div><div class="stat-lbl">protein / day</div></div>
<div class="stat"><div class="stat-val">6 days</div><div class="stat-lbl">per week</div></div>
</div>
<div class="tabs" id="tabs"></div>
<div id="days"></div>
</div>
<script>
const plan=[
{name:"Mon",label:"Maki day",type:"maki",desc:"Functional upper body — build the strength Maki uses to swing cursed tools with zero cursed energy",groups:[
{title:"Compound push",items:[["Push-ups (or knee push-ups)","3 × 12-15"],["Dumbbell shoulder press","3 × 10-12"],["Diamond push-ups","3 × 8-10"]]},
{title:"Pull",items:[["Inverted rows (or band rows)","3 × 10-12"],["Dumbbell curls","3 × 12"],["Band pull-aparts","3 × 15"]]},
{title:"Core",items:[["Dead bug","3 × 10/side"],["Plank hold","3 × 30-45s"]]}
]},
{name:"Tue",label:"Yuki day",type:"yuki",desc:"Explosive lower body — Yuki's devastating kicks come from raw leg power and hip drive",groups:[
{title:"Power",items:[["Jump squats (bodyweight)","3 × 8"],["Box step-ups (explosive)","3 × 10/leg"]]},
{title:"Strength",items:[["Goblet squats","3 × 12"],["Romanian deadlift (dumbbell)","3 × 10"],["Walking lunges","3 × 10/leg"]]},
{title:"Conditioning",items:[["Mountain climbers","3 × 30s"],["Calf raises","3 × 20"]]}
]},
{name:"Wed",label:"Maki day",type:"maki",desc:"Combat conditioning — Maki's speed and reflexes come from relentless cardio and agility work",groups:[
{title:"Circuit (3 rounds)",items:[["Burpees","10 reps"],["High knees","30s"],["Shadow boxing","60s"],["Jumping jacks","30s"]]},
{title:"Core & stability",items:[["Russian twists","3 × 15/side"],["Bicycle crunches","3 × 20"],["Side plank","3 × 20s/side"]]}
]},
{name:"Thu",label:"Yuki day",type:"yuki",desc:"Upper body power — Yuki's punches carry star-level mass behind them",groups:[
{title:"Push power",items:[["Explosive push-ups (clap or speed)","3 × 6-8"],["Dumbbell bench press","3 × 10"],["Pike push-ups","3 × 8-10"]]},
{title:"Pull power",items:[["Dumbbell rows","3 × 10/arm"],["Chin-up negatives (5s down)","3 × 5"],["Face pulls (band)","3 × 15"]]},
{title:"Arms",items:[["Hammer curls","3 × 12"],["Tricep dips (bench)","3 × 10-12"]]}
]},
{name:"Fri",label:"Maki day",type:"maki",desc:"Lower body endurance — Maki's footwork and stamina in prolonged fights against special grade curses",groups:[
{title:"Legs",items:[["Bodyweight squats (slow tempo 3s down)","3 × 15"],["Single-leg glute bridge","3 × 12/side"],["Wall sit","3 × 45s"]]},
{title:"Agility",items:[["Lateral shuffles","3 × 30s"],["Tuck jumps","3 × 8"]]},
{title:"Finisher",items:[["Farmer's carry (heavy bags)","3 × 30s"],["Plank to push-up","3 × 8"]]}
]},
{name:"Sat",label:"Yuki day",type:"yuki",desc:"Full body destruction — channel Yuki's overwhelming power into total-body compound movements",groups:[
{title:"Power complex",items:[["Dumbbell clean & press","3 × 8"],["Sumo deadlift (dumbbell)","3 × 10"],["Thruster (squat to press)","3 × 10"]]},
{title:"Conditioning",items:[["Kettlebell/dumbbell swings","3 × 15"],["Bear crawls","3 × 20m"],["Burpee to broad jump","3 × 6"]]}
]},
{name:"Sun",label:"Rest",type:"rest",desc:"Recovery — even the strongest sorcerers need to heal. Light stretching, walking, foam rolling.",groups:[
{title:"Active recovery",items:[["Light walk","20-30 min"],["Full body stretching","15 min"],["Foam rolling (if available)","10 min"]]}
]}
];
const tabsEl=document.getElementById('tabs');
const daysEl=document.getElementById('days');
plan.forEach((d,i)=>{
const btn=document.createElement('button');
btn.className='tab'+(i===0?' active':'');
btn.textContent=d.name;
btn.onclick=()=>{
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
btn.classList.add('active');
document.querySelectorAll('.day').forEach(el=>el.classList.remove('show'));
document.getElementById('d'+i).classList.add('show');
};
tabsEl.appendChild(btn);
let html='<div class="day'+(i===0?' show':'')+'" id="d'+i+'">';
const bc=d.type==='maki'?'badge-maki':d.type==='yuki'?'badge-yuki':'badge-rest';
html+='<span class="badge '+bc+'">'+d.label+'</span>';
html+='<div class="theme">'+d.desc+'</div>';
d.groups.forEach(g=>{
html+='<div class="exgroup"><div class="exgroup-title">'+g.title+'</div>';
g.items.forEach(ex=>{
html+='<div class="ex"><span class="ex-name">'+ex[0]+'</span><span class="ex-detail">'+ex[1]+'</span></div>';
});
html+='</div>';
});
if(d.type==='maki') html+='<div class="note">Maki focus: controlled tempo, full range of motion, minimal rest (45-60s). Build the engine.</div>';
if(d.type==='yuki') html+='<div class="note">Yuki focus: explosive reps, maximum effort, 60-90s rest. Power output over volume.</div>';
if(d.type==='rest') html+='<div class="note">Don\'t skip this. Sleep 7-8 hours. Hydrate. Your muscles grow during rest, not during training.</div>';
html+='</div>';
daysEl.innerHTML+=html;
});
</script>
